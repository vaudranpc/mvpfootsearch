<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MVP Foot — Générateur de visuels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Archivo+Black&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-app: #0b0e14;
        --panel: #12161f;
        --panel-2: #171c27;
        --line: #232938;
        --text: #e9edf5;
        --text-dim: #8a93a6;
        --accent: #2b6bff;
        --accent-2: #ff2b3d;
        --ok: #2bdc8b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg-app);
        color: var(--text);
        font-family: "Oswald", sans-serif;
        font-weight: 400;
        display: flex;
        min-height: 100vh;
      }
      .app {
        display: flex;
        width: 100%;
      }
      /* SIDEBAR */
      .sidebar {
        width: 380px;
        min-width: 380px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        padding: 22px 20px 40px;
        overflow-y: auto;
        max-height: 100vh;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
      }
      .brand .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 12px var(--accent-2);
      }
      .brand h1 {
        font-family: "Archivo Black", sans-serif;
        font-size: 15px;
        letter-spacing: 0.5px;
        margin: 0;
        text-transform: uppercase;
      }
      .brand span {
        color: var(--text-dim);
        font-size: 11px;
        display: block;
        margin-top: 2px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 20px;
        background: var(--panel-2);
        padding: 4px;
        border-radius: 10px;
      }
      .tab-btn {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text-dim);
        padding: 10px 6px;
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .tab-btn.active {
        background: var(--accent);
        color: #fff;
      }

      .group {
        margin-bottom: 22px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--line);
      }
      .group:last-child {
        border-bottom: none;
      }
      .group-title {
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-dim);
        margin: 0 0 12px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .group-title::before {
        content: "";
        width: 3px;
        height: 12px;
        background: var(--accent);
        display: inline-block;
        border-radius: 2px;
      }

      label {
        display: block;
        font-size: 11px;
        color: var(--text-dim);
        margin: 12px 0 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      label:first-child {
        margin-top: 0;
      }

      input[type="text"],
      textarea,
      select {
        width: 100%;
        background: var(--panel-2);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 8px;
        font-family: "Oswald", sans-serif;
        font-size: 13px;
        resize: vertical;
      }
      textarea {
        min-height: 64px;
        line-height: 1.4;
      }
      input[type="text"]:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: var(--accent);
      }

      .row {
        display: flex;
        gap: 10px;
      }
      .row > * {
        flex: 1;
      }

      .file-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--panel-2);
        border: 1px dashed var(--line);
        color: var(--text-dim);
        padding: 12px;
        border-radius: 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: 0.15s;
      }
      .file-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .file-btn.has-file {
        border-style: solid;
        border-color: var(--ok);
        color: var(--ok);
      }
      input[type="file"] {
        display: none;
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      input[type="color"] {
        -webkit-appearance: none;
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: none;
        padding: 0;
        cursor: pointer;
        flex: none;
      }
      input[type="color"]::-webkit-color-swatch {
        border-radius: 6px;
        border: none;
      }
      .color-label {
        font-size: 12px;
        color: var(--text);
        flex: 1;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }
      .range-val {
        font-size: 11px;
        color: var(--text-dim);
        text-align: right;
        margin-top: 2px;
      }

      .swap-btn {
        width: 100%;
        margin-top: 14px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text-dim);
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        cursor: pointer;
        border: 1px solid var(--line);
      }
      .swap-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }

      /* MAIN */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 34px 24px;
        gap: 20px;
        overflow-y: auto;
      }
      .canvas-wrap {
        background: #000;
        border-radius: 6px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        line-height: 0;
      }
      canvas {
        display: block;
        max-width: min(92vw, 460px);
        height: auto;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        font-family: "Oswald", sans-serif;
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 14px 26px;
        border-radius: 9px;
        border: none;
        cursor: pointer;
        transition: 0.15s;
      }
      .btn-primary {
        background: var(--accent-2);
        color: #fff;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
      }
      .btn-secondary {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .btn-secondary:hover {
        border-color: var(--accent);
      }

      .size-select {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
        color: var(--text-dim);
      }
      .size-select select {
        width: auto;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: 4px;
      }

      @media (max-width: 860px) {
        .app {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          min-width: 0;
          max-height: none;
          border-right: none;
          border-bottom: 1px solid var(--line);
        }
        .main {
          padding: 20px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="dot"></div>
          <div>
            <h1>Générateur de visuels</h1>
            <span>MVP Foot / Top Gbairai Tools</span>
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-template="A">Titre choc</button>
          <button class="tab-btn" data-template="B">Citation</button>
        </div>

        <!-- FORMAT -->
        <div class="group">
          <p class="group-title">Format</p>
          <select id="canvasSize">
            <option value="1080x1350">Portrait 4:5 (1080×1350)</option>
            <option value="1080x1080">Carré (1080×1080)</option>
            <option value="1080x1920">Story 9:16 (1080×1920)</option>
          </select>
        </div>

        <!-- IMAGES -->
        <div class="group" id="imagesGroup">
          <p class="group-title">Images</p>
          <label>Photo principale</label>
          <button class="file-btn" id="mainImgBtn">Choisir une image</button>
          <input type="file" id="mainImgInput" accept="image/*" />

          <div id="secondaryImgWrap">
            <label id="secondaryLabel">Logo / badge (coin haut-gauche)</label>
            <button class="file-btn" id="secondaryImgBtn">
              Choisir une image
            </button>
            <input type="file" id="secondaryImgInput" accept="image/*" />
          </div>
        </div>

        <!-- TEXTES -->
        <div class="group">
          <p class="group-title">Textes</p>

          <div id="fieldEyebrow">
            <label>Petit texte (coin, optionnel)</label>
            <input type="text" id="eyebrowText" value="COUPE DU MONDE" />
          </div>

          <label id="headlineLabel">Titre principal</label>
          <textarea id="headlineText">
L'ARGENTINE COMMENCE À SÉRIEUSEMENT DOUTER DE LIONEL SCALONI</textarea
          >

          <div id="fieldHighlight">
            <label
              >Mot(s) à surligner dans le titre (laisser vide = aucun)</label
            >
            <input type="text" id="highlightWord" value="" />
          </div>

          <div id="fieldAttribution">
            <label>Attribution / légende (sous le titre)</label>
            <input
              type="text"
              id="attributionText"
              value="— MURAT YAKIN, SÉLECTIONNEUR DE LA SUISSE"
            />
          </div>

          <div id="fieldTag">
            <label>Texte du bandeau bas</label>
            <input type="text" id="tagText" value="COUPE DU MONDE" />
          </div>
        </div>

        <!-- STYLE -->
        <div class="group">
          <p class="group-title">Style</p>

          <label>Police du titre</label>
          <select id="fontFamily">
            <option value="'Anton', sans-serif">Anton</option>
            <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
            <option value="'Archivo Black', sans-serif">Archivo Black</option>
            <option value="'Oswald', sans-serif">Oswald</option>
          </select>

          <label>Taille du titre</label>
          <input type="range" id="fontSize" min="36" max="100" value="64" />
          <div class="range-val" id="fontSizeVal">64px</div>

          <div class="row">
            <div>
              <label>Couleur du texte</label>
              <div class="color-row">
                <input type="color" id="textColor" value="#ffffff" />
                <span class="color-label">Titre</span>
              </div>
            </div>
            <div>
              <label>Couleur d'accent</label>
              <div class="color-row">
                <input type="color" id="accentColor" value="#2b6bff" />
                <span class="color-label">Bleu / Rouge...</span>
              </div>
            </div>
          </div>

          <label>Couleur surlignage</label>
          <div class="color-row">
            <input type="color" id="highlightColor" value="#ffe600" />
            <span class="color-label">Mot(s) surligné(s)</span>
          </div>

          <label>Assombrissement du fond</label>
          <input type="range" id="darkness" min="0" max="90" value="55" />
          <div class="range-val" id="darknessVal">55%</div>
        </div>

        <button class="swap-btn" id="resetBtn">
          Réinitialiser les réglages
        </button>
      </aside>

      <main class="main">
        <div class="canvas-wrap">
          <canvas id="canvas" width="1080" height="1350"></canvas>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" id="randomBtn">
            Aperçu aléatoire
          </button>
          <button class="btn btn-primary" id="downloadBtn">
            Télécharger le PNG
          </button>
        </div>
      </main>
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let state = {
        template: "A",
        size: [1080, 1350],
        mainImg: null,
        secondaryImg: null,
        eyebrow: "COUPE DU MONDE",
        headline:
          "L'ARGENTINE COMMENCE À SÉRIEUSEMENT DOUTER DE LIONEL SCALONI",
        highlightWord: "",
        attribution: "— MURAT YAKIN, SÉLECTIONNEUR DE LA SUISSE",
        tag: "COUPE DU MONDE",
        font: "'Anton', sans-serif",
        fontSize: 64,
        textColor: "#ffffff",
        accentColor: "#2b6bff",
        highlightColor: "#ffe600",
        darkness: 55,
      };

      // Each template keeps its own text content + font size so switching
      // templates doesn't leave you with a headline sized/written for the other one.
      const templateDefaults = {
        A: {
          eyebrow: "COUPE DU MONDE",
          headline:
            "L'ARGENTINE COMMENCE À SÉRIEUSEMENT DOUTER DE LIONEL SCALONI",
          highlightWord: "",
          tag: "COUPE DU MONDE",
          fontSize: 64,
        },
        B: {
          headline:
            "LA DÉCISION DE LA VAR ET DE L'ARBITRE ÉTAIT TOUT SIMPLEMENT SCANDALEUSE.",
          highlightWord: "SCANDALEUSE.",
          attribution: "— MURAT YAKIN, SÉLECTIONNEUR DE LA SUISSE",
          fontSize: 52,
        },
      };

      const savedState = {
        A: { ...templateDefaults.A },
        B: { ...templateDefaults.B },
      };

      function applyTemplateFields(t) {
        const d = savedState[t];
        if (t === "A") {
          document.getElementById("eyebrowText").value = d.eyebrow;
          document.getElementById("tagText").value = d.tag;
          state.eyebrow = d.eyebrow;
          state.tag = d.tag;
        } else {
          document.getElementById("attributionText").value = d.attribution;
          state.attribution = d.attribution;
        }
        document.getElementById("headlineText").value = d.headline;
        document.getElementById("highlightWord").value = d.highlightWord;
        document.getElementById("fontSize").value = d.fontSize;
        document.getElementById("fontSizeVal").textContent = d.fontSize + "px";
        state.headline = d.headline;
        state.highlightWord = d.highlightWord;
        state.fontSize = d.fontSize;
      }

      function saveTemplateFields(t) {
        const d = savedState[t];
        d.headline = state.headline;
        d.highlightWord = state.highlightWord;
        d.fontSize = state.fontSize;
        if (t === "A") {
          d.eyebrow = state.eyebrow;
          d.tag = state.tag;
        } else {
          d.attribution = state.attribution;
        }
      }

      function loadImageFromFile(file, cb) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => cb(img);
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function wrapText(text, maxWidth, font) {
        ctx.font = font;
        const words = text.split(/\s+/);
        const lines = [];
        let current = "";
        for (let w of words) {
          const test = current ? current + " " + w : w;
          if (ctx.measureText(test).width > maxWidth && current) {
            lines.push(current);
            current = w;
          } else {
            current = test;
          }
        }
        if (current) lines.push(current);
        return lines;
      }

      function drawCover(img, x, y, w, h) {
        const imgRatio = img.width / img.height;
        const boxRatio = w / h;
        let sx, sy, sw, sh;
        if (imgRatio > boxRatio) {
          sh = img.height;
          sw = sh * boxRatio;
          sx = (img.width - sw) / 2;
          sy = 0;
        } else {
          sw = img.width;
          sh = sw / boxRatio;
          sx = 0;
          sy = (img.height - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function drawPlaceholder(x, y, w, h, label) {
        ctx.save();
        ctx.fillStyle = "#1a1f2b";
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = "#333a4a";
        ctx.lineWidth = 3;
        ctx.setLineDash([14, 10]);
        ctx.strokeRect(x + 4, y + 4, w - 8, h - 8);
        ctx.setLineDash([]);
        ctx.fillStyle = "#5a6377";
        ctx.font = "500 30px 'Oswald', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, x + w / 2, y + h / 2);
        ctx.restore();
      }

      function render() {
        const [W, H] = state.size;
        canvas.width = W;
        canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        if (state.template === "A") {
          renderTemplateA(W, H);
        } else {
          renderTemplateB(W, H);
        }
      }

      function renderTemplateA(W, H) {
        // background image
        if (state.mainImg) {
          drawCover(state.mainImg, 0, 0, W, H);
        } else {
          drawPlaceholder(
            0,
            0,
            W,
            H,
            "Cliquez pour ajouter la photo principale",
          );
        }

        // dark gradient bottom for legibility
        const grad = ctx.createLinearGradient(0, H * 0.35, 0, H);
        grad.addColorStop(0, "rgba(0,0,0,0)");
        grad.addColorStop(
          1,
          `rgba(0,0,0,${((state.darkness / 100) * 0.95 + 0.05).toFixed(2)})`,
        );
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // overall darkness overlay top too, subtle
        ctx.fillStyle = `rgba(0,0,0,${((state.darkness / 100) * 0.25).toFixed(2)})`;
        ctx.fillRect(0, 0, W, H * 0.4);

        const accent = state.accentColor;

        // diagonal corner shapes (top-left)
        ctx.save();
        ctx.fillStyle = accent;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(W * 0.34, 0);
        ctx.lineTo(0, H * 0.16);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(W * 0.24, 0);
        ctx.lineTo(0, H * 0.1);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // diagonal corner shapes (bottom-right)
        ctx.save();
        ctx.fillStyle = accent;
        ctx.beginPath();
        ctx.moveTo(W, H);
        ctx.lineTo(W - W * 0.36, H);
        ctx.lineTo(W, H - H * 0.14);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // top-left badge / logo
        const badgeSize = W * 0.09;
        const badgeX = W * 0.045,
          badgeY = H * 0.03;
        if (state.secondaryImg) {
          ctx.save();
          ctx.beginPath();
          roundRect(badgeX, badgeY, badgeSize, badgeSize * 1.15, 10);
          ctx.clip();
          ctx.fillStyle = "#fff";
          ctx.fillRect(badgeX, badgeY, badgeSize, badgeSize * 1.15);
          const pad = badgeSize * 0.08;
          drawCover(
            state.secondaryImg,
            badgeX + pad,
            badgeY + pad,
            badgeSize - pad * 2,
            badgeSize * 1.15 - pad * 2,
          );
          ctx.restore();
        }

        // top-right small watermark (eyebrow initial or star)
        if (state.eyebrow) {
          ctx.save();
          ctx.font = `600 ${W * 0.024}px 'Oswald', sans-serif`;
          ctx.fillStyle = "rgba(255,255,255,0.85)";
          ctx.textAlign = "right";
          ctx.textBaseline = "top";
          ctx.fillText("★ MVP", W * 0.955, H * 0.035);
          ctx.restore();
        }

        // headline text
        const maxWidth = W * 0.9;
        const fontPx = state.fontSize * (W / 1080);
        const lineHeight = fontPx * 1.08;
        const font = `${fontPx}px ${state.font}`;
        const lines = wrapText(state.headline.toUpperCase(), maxWidth, font);

        const tagBoxH = state.tag ? H * 0.052 : 0;
        const tagMarginTop = state.tag ? H * 0.03 : 0;
        const blockHeight = lines.length * lineHeight;
        let startY = H - H * 0.09 - tagBoxH - tagMarginTop - blockHeight;

        ctx.font = font;
        ctx.textAlign = "center";
        ctx.textBaseline = "alphabetic";

        const hw = state.highlightWord.trim().toUpperCase();

        lines.forEach((line, i) => {
          const y = startY + (i + 1) * lineHeight - (lineHeight - fontPx) * 0.3;
          if (hw && line.includes(hw)) {
            // draw with highlight
            const parts = line.split(hw);
            const totalWidth = ctx.measureText(line).width;
            let x = W / 2 - totalWidth / 2;
            ctx.textAlign = "left";
            for (let p = 0; p < parts.length; p++) {
              ctx.fillStyle = state.textColor;
              ctx.fillText(parts[p], x, y);
              x += ctx.measureText(parts[p]).width;
              if (p < parts.length - 1) {
                ctx.fillStyle = state.highlightColor;
                ctx.fillText(hw, x, y);
                x += ctx.measureText(hw).width;
              }
            }
            ctx.textAlign = "center";
          } else {
            ctx.fillStyle = state.textColor;
            ctx.fillText(line, W / 2, y);
          }
        });

        // tag box
        if (state.tag) {
          const tagY = H - H * 0.075 - tagBoxH;
          ctx.font = `600 ${W * 0.028}px 'Oswald', sans-serif`;
          const textW = ctx.measureText(state.tag.toUpperCase()).width;
          const boxW = textW + W * 0.07;
          const boxX = W / 2 - boxW / 2;

          ctx.save();
          ctx.strokeStyle = accent;
          ctx.lineWidth = 4;
          roundRect(boxX, tagY, boxW, tagBoxH, 6);
          ctx.stroke();
          ctx.fillStyle = "rgba(10,14,20,0.35)";
          roundRect(boxX, tagY, boxW, tagBoxH, 6);
          ctx.fill();
          ctx.fillStyle = "#ffffff";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(state.tag.toUpperCase(), W / 2, tagY + tagBoxH / 2 + 2);
          ctx.restore();
        }
      }

      function renderTemplateB(W, H) {
        // background image full bleed
        if (state.mainImg) {
          drawCover(state.mainImg, 0, 0, W, H * 0.78);
        } else {
          drawPlaceholder(
            0,
            0,
            W,
            H * 0.78,
            "Cliquez pour ajouter la photo principale",
          );
        }

        // bottom panel background
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, H * 0.72, W, H * 0.28);

        // gradient fade at seam
        const seamGrad = ctx.createLinearGradient(0, H * 0.6, 0, H * 0.78);
        seamGrad.addColorStop(0, "rgba(0,0,0,0)");
        seamGrad.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = seamGrad;
        ctx.fillRect(0, H * 0.6, W, H * 0.18);

        // top darkness overlay for legibility of any top text
        ctx.fillStyle = `rgba(0,0,0,${((state.darkness / 100) * 0.3).toFixed(2)})`;
        ctx.fillRect(0, 0, W, H * 0.3);

        // circular inset image top-right
        if (state.secondaryImg) {
          const r = W * 0.18;
          const cx = W * 0.82,
            cy = H * 0.235;
          ctx.save();
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.closePath();
          ctx.lineWidth = W * 0.012;
          ctx.strokeStyle = "#ffffff";
          ctx.stroke();
          ctx.save();
          ctx.beginPath();
          ctx.arc(cx, cy, r - W * 0.006, 0, Math.PI * 2);
          ctx.clip();
          drawCover(state.secondaryImg, cx - r, cy - r, r * 2, r * 2);
          ctx.restore();
          ctx.restore();
        }

        const accent = state.accentColor;
        const padX = W * 0.07;

        // divider line
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = W * 0.006;
        ctx.setLineDash([W * 0.028, W * 0.012]);
        ctx.beginPath();
        ctx.moveTo(padX, H * 0.775);
        ctx.lineTo(W - padX, H * 0.775);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // headline / quote text — auto-shrink to fit the available panel height
        const maxWidth = W - padX * 2;
        const panelTop = H * 0.8; // just below the dashed divider
        const attributionH = state.attribution ? H * 0.05 : 0;
        const availableH = H * 0.985 - panelTop - attributionH;

        let fontPx = state.fontSize * (W / 1080);
        const minFontPx = 20 * (W / 1080);
        let lineHeight, font, lines;

        while (true) {
          lineHeight = fontPx * 1.1;
          font = `${fontPx}px ${state.font}`;
          lines = wrapText(state.headline.toUpperCase(), maxWidth, font);
          const blockHeight = lines.length * lineHeight;
          if (blockHeight <= availableH || fontPx <= minFontPx) break;
          fontPx -= 2;
        }

        ctx.font = font;
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";

        let y = panelTop + fontPx;
        const hw = state.highlightWord.trim().toUpperCase();

        lines.forEach((line) => {
          if (hw && line.includes(hw)) {
            const parts = line.split(hw);
            let x = padX;
            for (let p = 0; p < parts.length; p++) {
              ctx.fillStyle = state.textColor;
              ctx.fillText(parts[p], x, y);
              x += ctx.measureText(parts[p]).width;
              if (p < parts.length - 1) {
                ctx.fillStyle = state.highlightColor;
                ctx.fillText(hw, x, y);
                x += ctx.measureText(hw).width;
              }
            }
          } else {
            ctx.fillStyle = state.textColor;
            ctx.fillText(line, padX, y);
          }
          y += lineHeight;
        });

        // attribution
        if (state.attribution) {
          ctx.font = `500 ${W * 0.026}px 'Oswald', sans-serif`;
          ctx.fillStyle = accent;
          ctx.textAlign = "left";
          ctx.fillText(
            state.attribution.toUpperCase(),
            padX,
            y + fontPx * 0.28,
          );
        }
      }

      // ---------- UI BINDINGS ----------

      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const newTemplate = btn.dataset.template;
          if (newTemplate === state.template) return;
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          saveTemplateFields(state.template);
          state.template = newTemplate;
          applyTemplateFields(newTemplate);
          updateFieldVisibility();
          render();
        });
      });

      function updateFieldVisibility() {
        const isA = state.template === "A";
        document.getElementById("fieldEyebrow").style.display = isA
          ? "block"
          : "none";
        document.getElementById("fieldTag").style.display = isA
          ? "block"
          : "none";
        document.getElementById("fieldAttribution").style.display = isA
          ? "none"
          : "block";
        document.getElementById("secondaryLabel").textContent = isA
          ? "Logo / badge (coin haut-gauche)"
          : "Photo secondaire (médaillon)";
        document.getElementById("headlineLabel").textContent = isA
          ? "Titre principal"
          : "Citation / titre";
      }

      document.getElementById("canvasSize").addEventListener("change", (e) => {
        const [w, h] = e.target.value.split("x").map(Number);
        state.size = [w, h];
        render();
      });

      document
        .getElementById("mainImgBtn")
        .addEventListener("click", () =>
          document.getElementById("mainImgInput").click(),
        );
      document
        .getElementById("mainImgInput")
        .addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          loadImageFromFile(file, (img) => {
            state.mainImg = img;
            document.getElementById("mainImgBtn").classList.add("has-file");
            document.getElementById("mainImgBtn").textContent =
              "✓ " + file.name;
            render();
          });
        });

      document
        .getElementById("secondaryImgBtn")
        .addEventListener("click", () =>
          document.getElementById("secondaryImgInput").click(),
        );
      document
        .getElementById("secondaryImgInput")
        .addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          loadImageFromFile(file, (img) => {
            state.secondaryImg = img;
            document
              .getElementById("secondaryImgBtn")
              .classList.add("has-file");
            document.getElementById("secondaryImgBtn").textContent =
              "✓ " + file.name;
            render();
          });
        });

      function bindText(id, key, transform) {
        document.getElementById(id).addEventListener("input", (e) => {
          state[key] = transform ? transform(e.target.value) : e.target.value;
          render();
        });
      }
      bindText("eyebrowText", "eyebrow");
      bindText("headlineText", "headline");
      bindText("highlightWord", "highlightWord");
      bindText("attributionText", "attribution");
      bindText("tagText", "tag");

      document.getElementById("fontFamily").addEventListener("change", (e) => {
        state.font = e.target.value;
        render();
      });

      document.getElementById("fontSize").addEventListener("input", (e) => {
        state.fontSize = Number(e.target.value);
        document.getElementById("fontSizeVal").textContent =
          state.fontSize + "px";
        render();
      });

      document.getElementById("textColor").addEventListener("input", (e) => {
        state.textColor = e.target.value;
        render();
      });
      document.getElementById("accentColor").addEventListener("input", (e) => {
        state.accentColor = e.target.value;
        render();
      });
      document
        .getElementById("highlightColor")
        .addEventListener("input", (e) => {
          state.highlightColor = e.target.value;
          render();
        });
      document.getElementById("darkness").addEventListener("input", (e) => {
        state.darkness = Number(e.target.value);
        document.getElementById("darknessVal").textContent =
          state.darkness + "%";
        render();
      });

      document.getElementById("downloadBtn").addEventListener("click", () => {
        const link = document.createElement("a");
        link.download = "mvp-foot-visuel.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        location.reload();
      });

      document.getElementById("randomBtn").addEventListener("click", () => {
        const accents = ["#2b6bff", "#ff2b3d", "#ffb703", "#00c2a8", "#ff8c00"];
        state.accentColor = accents[Math.floor(Math.random() * accents.length)];
        document.getElementById("accentColor").value = state.accentColor;
        render();
      });

      // initial
      applyTemplateFields("A");
      updateFieldVisibility();

      // wait for fonts then render
      document.fonts.ready.then(render);
      setTimeout(render, 300);
    </script>
  </body>
</html>

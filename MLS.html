<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP Info – Quote Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    gap: 20px;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .badge {
    background: #F5A800;
    color: #000;
    font-weight: 900;
    font-size: 16px;
    padding: 4px 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header span {
    color: #555;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .preview-wrap {
    width: 100%;
    max-width: 960px;
  }

  #capture {
    width: 960px;
    height: 540px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 50px 70px;
    overflow: hidden;
  }

  .preview-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.05;
    text-transform: uppercase;
    color: #fff;
    letter-spacing: -0.5px;
    word-break: break-word;
  }
  .preview-text .gold { color: #F5A800; }

  .controls {
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    padding: 14px 18px;
    resize: vertical;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.4;
  }
  textarea::placeholder { color: #444; }
  textarea:focus { border-color: #F5A800; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .slider-label {
    color: #888;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  input[type=range] {
    flex: 1;
    accent-color: #F5A800;
    cursor: pointer;
  }
  .slider-val {
    color: #F5A800;
    font-weight: 900;
    font-size: 22px;
    min-width: 30px;
    text-align: center;
  }

  .btn {
    align-self: flex-end;
    background: #F5A800;
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 13px 30px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: wait; }
</style>
 <script src="header.js"></script>
</head>
<body>
  <div id="header-container"></div>
<div class="header">
  <div class="badge">MVP INFO</div>
  <span>Quote Generator</span>
</div>

<div class="preview-wrap">
  <div id="capture">
    <div class="preview-text" id="preview"></div>
  </div>
</div>

<div class="controls">
  <textarea id="inputText" rows="3" placeholder="ÉCRIS TON TEXTE ICI...">Guéla Doué freiné par un virus, retour attendu pour la demi-finale de Ligue Europa Conférence.</textarea>

  <div class="slider-row">
    <span class="slider-label">Mots en or :</span>
    <input type="range" id="slider" min="1" value="5">
    <span class="slider-val" id="sliderVal">5</span>
  </div>

  <button class="btn" id="dlBtn" onclick="telechargerPNG()">↓ Télécharger PNG</button>
</div>
 
<script>
  const textarea  = document.getElementById('inputText');
  const slider    = document.getElementById('slider');
  const sliderVal = document.getElementById('sliderVal');
  const preview   = document.getElementById('preview');
  const dlBtn     = document.getElementById('dlBtn');

  function getWords() {
    return textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
  }

  function render() {
    const words = getWords();
    const total = words.length;
    const n = parseInt(slider.value);

    slider.max = Math.max(1, total);
    sliderVal.textContent = n;

    if (total === 0) { preview.innerHTML = ''; return; }

    const split = Math.max(0, total - n);
    const white = words.slice(0, split).join(' ');
    const gold  = words.slice(split).join(' ');

    preview.innerHTML =
      (white ? white + ' ' : '') +
      (gold ? `<span class="gold">${gold}</span>` : '');
  }

  async function telechargerPNG() {
    dlBtn.disabled = true;
    dlBtn.textContent = 'Export en cours...';

    const capture = document.getElementById('capture');

    const canvas = await html2canvas(capture, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#000',
      logging: false,
    });

    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'mvp_info_quote.png';
      a.click();
      dlBtn.disabled = false;
      dlBtn.textContent = '↓ Télécharger PNG';
    }, 'image/png');
  }

  textarea.addEventListener('input', render);
  slider.addEventListener('input', render);

  render();
</script>
</body>
</html>

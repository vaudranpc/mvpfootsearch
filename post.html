<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Article Presse Generator — MVP Info</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
  :root {
    --ink:        #0d0d0d;
    --paper:      #faf8f2;
    --paper-dark: #f0ece0;
    --accent:     #c8102e;
    --accent2:    #1a4fa0;
    --muted:      #6b6b6b;
    --rule:       #0d0d0d;
  }

  * { box-sizing: border-box; }

  body {
    background: #1a1a1a;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── MASTHEAD ── */
  .masthead {
    background: var(--ink);
    border-bottom: 4px solid var(--accent);
    padding: 18px 0 12px;
    text-align: center;
  }
  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2.4rem;
    color: var(--paper);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1;
  }
  .masthead-sub {
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    color: #aaa;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--paper);
    border-top: 6px solid var(--accent);
    border-radius: 0 !important;
  }
  .form-card .card-header {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-radius: 0 !important;
    padding: 10px 20px;
  }
  .form-card .card-body { padding: 28px 28px 20px; }
  .form-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .form-control, .form-control:focus {
    border-radius: 0 !important;
    border: 1.5px solid #ccc;
    background: #fff;
    font-family: 'Source Serif 4', serif;
    font-size: 0.95rem;
    box-shadow: none !important;
    color: var(--ink);
  }
  .form-control:focus { border-color: var(--accent2); }
  textarea.form-control { min-height: 140px; resize: vertical; }

  .btn-generate {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: 0.8rem;
    border: none;
    border-radius: 0;
    padding: 12px 32px;
    transition: background .2s;
  }
  .btn-generate:hover { background: #a0001f; color: #fff; }

  /* ── MODAL ── */
  .modal-dialog { max-width: 860px; }
  .modal-content { border-radius: 0 !important; border: none; background: transparent; }
  .modal-header {
    background: var(--ink);
    border-radius: 0 !important;
    padding: 10px 20px;
    border-bottom: 3px solid var(--accent);
  }
  .modal-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #aaa;
  }
  .modal-body { background: var(--paper); padding: 0; }
  .modal-footer {
    background: var(--paper-dark);
    border-top: 1px solid #d5d0c0;
    border-radius: 0 !important;
    padding: 12px 20px;
  }
  .btn-dl {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 0;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 22px;
    transition: background .2s;
  }
  .btn-dl:hover { background: #133a7a; color: #fff; }
  .btn-close-custom {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid #bbb;
    border-radius: 0;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 8px 18px;
    transition: all .2s;
  }
  .btn-close-custom:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ══════════════════════════
     ARTICLE PREVIEW
  ══════════════════════════ */
  #article {
    font-family: 'Source Serif 4', serif;
    background: var(--paper);
    color: var(--ink);
    
    background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
  }

  /* Publication line */
  .art-publication-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 3px solid var(--rule);
    border-bottom: 1px solid var(--rule);

    margin-bottom: 22px;
    font-size: 0.65rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .art-pub-name { color: var(--accent); }

  /* Titre */
  #article h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 900;
    line-height: 1.08;
    margin-bottom: 18px;
    color: var(--ink);
  }

  .art-divider {
    border: none;
    border-top: 2px solid var(--rule);
    margin: 0 0 22px;
  }

  /* ── LAYOUT CÔTE À CÔTE ── */
  .art-body {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }

  /* Image à gauche, taille fixe, max 500x500 */
  .art-img-col {
    flex: 0 0 auto;
    width: 45%;
    max-width: 500px;
  }
  .art-img-col img {
    width: 100%;
    max-height: 500px;
    object-fit: cover;
    display: block;
    filter: contrast(106%) brightness(97%);
  }

  /* Texte à droite */
  .art-text-col {
    flex: 1 1 0;
    min-width: 0;
  }

  /* Texte agrandi */
  .art-text-col p {
    font-family: 'Source Serif 4', serif;
    font-size: 1.2rem;
    line-height: 1.75;
    text-align: justify;
    color: var(--ink);
    margin: 0;
  }

  /* Tag pill */
  .tag-pill {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 9px;
    margin-right: 7px;
    vertical-align: middle;
    position: relative;
    top: -2px;
  }

  /* Quand pas d'image : texte pleine largeur */
  .art-body.no-image .art-text-col p {
    font-size: 1.2rem;
  }

  @media (max-width: 600px) {
    #article { padding: 24px 20px; }
    #article h1 { font-size: 1.75rem; }
    .art-body { flex-direction: column; gap: 16px; }
    .art-img-col { width: 100%; max-width: 100%; }
    .art-text-col p { font-size: 1.05rem; }
  }
</style>
</head>

<body>

<!-- MASTHEAD -->
<div class="masthead">
  <div class="masthead-title">MVP Info</div>
  <div class="masthead-sub">Générateur d'article de presse</div>
</div>

<!-- FORM -->
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">

      <div class="card form-card shadow-lg">
        <div class="card-header">✏️ &nbsp;Rédiger un article</div>
        <div class="card-body">

          <div class="mb-3">
            <label class="form-label">Titre</label>
            <input type="text" class="form-control" id="title" placeholder="Ex: Agbadou, le mur ivoirien">
          </div>

          <div class="mb-3">
            <label class="form-label">Contenu</label>
            <textarea class="form-control" id="content" placeholder="Rédigez votre article ici…"></textarea>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-sm-5">
              <label class="form-label">Tag</label>
              <input type="text" class="form-control" id="tag" placeholder="LIGUE 1">
            </div>
            <div class="col-sm-7">
              <label class="form-label">Image (optionnel)</label>
              <input type="file" class="form-control" id="imageInput" accept="image/*">
            </div>
          </div>

          <div class="d-flex justify-content-end">
            <button class="btn btn-generate" onclick="generate()">Générer l'article →</button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <span class="modal-title">📰 Aperçu de l'article</span>
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="article"></div>
      </div>

      <div class="modal-footer gap-2">
        <button class="btn btn-dl" onclick="downloadPNG()">📥 Télécharger PNG</button>
        <button class="btn btn-close-custom" data-bs-dismiss="modal">✕ Fermer</button>
      </div>

    </div>
  </div>
</div>

<script>
  const previewModal = new bootstrap.Modal(document.getElementById('previewModal'));

  document.getElementById('previewModal').addEventListener('hidden.bs.modal', () => {
    ['title','content','tag','imageInput'].forEach(id => {
      document.getElementById(id).value = "";
    });
  });

  function generate() {
    const title   = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const tag     = document.getElementById("tag").value.trim();
    const imgFile = document.getElementById("imageInput").files[0];

    if (!title && !content) {
      alert("Veuillez saisir au moins un titre ou du contenu.");
      return;
    }

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    const tagHTML = tag ? `<span class="tag-pill">${tag}</span> ` : "";

    // Image column
    let imgColHTML = "";
    if (imgFile) {
      const url = URL.createObjectURL(imgFile);
      imgColHTML = `<div class="art-img-col"><img src="${url}" alt="Illustration"></div>`;
    }

    // Text column — only if there's content or tag
    let textColHTML = "";
    const bodyText = (tag + content).trim();
    if (bodyText) {
      textColHTML = `<div class="art-text-col"><p>${tagHTML}${content}</p></div>`;
    }

    // Body layout
    let bodyHTML = "";
    if (imgColHTML || textColHTML) {
      const noImgClass = imgColHTML ? "" : " no-image";
      bodyHTML = `<div class="art-body${noImgClass}">${imgColHTML}${textColHTML}</div>`;
    }

    document.getElementById("article").innerHTML = `
      <h1>${title || "Sans titre"}</h1>
      <hr class="art-divider">

      ${bodyHTML}
    `;

    previewModal.show();
  }

  function downloadPNG() {
    const el = document.getElementById("article");
    html2canvas(el, {
      scale: 3,
      backgroundColor: "#faf8f2",
      useCORS: true,
      allowTaint: true
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = "article-mvpinfo.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  }
</script>

</body>
</html>

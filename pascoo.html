<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MVP Info – Quote Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  gap: 20px;
  font-family: 'Barlow Condensed', sans-serif;
}

/* HEADER */
.header { display: flex; align-items: center; gap: 12px; }
.badge {
  background: #F5A800;
  color: #000;
  font-weight: 900;
  padding: 4px 14px;
}
.header span { color: #555; font-size: 13px; }

/* PREVIEW */
#capture {
  width: 960px;
  height: 540px;
  background: #000;
  display: flex;
  align-items: center;
  padding: 50px 70px;
}

.preview-text {
  font-size: 68px;
  line-height: 1.05;
  text-transform: uppercase;
  color: #fff;
  word-break: break-word;
}

/* CONTROLES */
.controls {
  width: 960px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

textarea, input, select {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #fff;
  padding: 12px;
}

/* BUTTON */
.btn {
  align-self: flex-end;
  background: #F5A800;
  border: none;
  padding: 12px 25px;
  font-weight: 900;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="badge">MVP INFO</div>
  <span>Quote Generator</span>
</div>

<div id="capture">
  <div class="preview-text" id="preview"></div>
</div>

<div class="controls">

  <textarea id="inputText">Guéla Doué freiné par un virus, retour attendu pour la demi-finale de Ligue Europa Conférence.</textarea>

  <textarea id="inputHighlight">demi-finale de Ligue Europa Conférence</textarea>

  <!-- 🎨 COULEUR LIBRE -->
  <input type="color" id="colorPicker" value="#F5A800">

  <!-- 🔠 POIDS TEXTE -->
  <select id="fontWeight">
    <option value="400">Normal</option>
    <option value="700">Semi-bold</option>
    <option value="900" selected>Bold</option>
  </select>

  <!-- 📏 TAILLE -->
  <input type="range" id="slider" min="30" max="100" value="68">

  <button class="btn" id="dlBtn">Télécharger PNG</button>

</div>

<script>
const inputText = document.getElementById('inputText');
const inputHighlight = document.getElementById('inputHighlight');
const preview = document.getElementById('preview');
const slider = document.getElementById('slider');
const colorPicker = document.getElementById('colorPicker');
const fontWeight = document.getElementById('fontWeight');
const dlBtn = document.getElementById('dlBtn');

/* SECURITE REGEX */
function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function render() {
  let text = inputText.value;
  let highlight = inputHighlight.value;
  let color = colorPicker.value;

  preview.style.fontSize = slider.value + "px";
  preview.style.fontWeight = fontWeight.value;

  if (highlight) {
    let regex = new RegExp('(' + escapeRegex(highlight) + ')', 'gi');
    text = text.replace(regex, `<span style="color:${color}">$1</span>`);
  }

  preview.innerHTML = text;
}

inputText.addEventListener('input', render);
inputHighlight.addEventListener('input', render);
slider.addEventListener('input', render);
colorPicker.addEventListener('input', render);
fontWeight.addEventListener('change', render);

/* DOWNLOAD */
dlBtn.addEventListener('click', async () => {
  const canvas = await html2canvas(document.getElementById('capture'), {
    scale: 2,
    backgroundColor: '#000'
  });

  const link = document.createElement('a');
  link.download = "mvp_quote.png";
  link.href = canvas.toDataURL();
  link.click();
});

render();
</script>

</body>
</html>

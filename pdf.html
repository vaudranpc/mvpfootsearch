<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF → PNG | Top Gbairai Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
      :root {
        --bg: #0b0e14;
        --panel: #131722;
        --panel-2: #191f2e;
        --border: #232a3b;
        --gold: #d4af37;
        --gold-dim: #a68a2e;
        --text: #e8eaf0;
        --text-dim: #8892a6;
        --green: #2ecc71;
        --danger: #e74c3c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Archivo", sans-serif;
        min-height: 100vh;
      }
      header {
        padding: 28px 32px 20px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, var(--panel-2), var(--bg));
      }
      h1 {
        font-family: "Anton", sans-serif;
        letter-spacing: 1px;
        margin: 0;
        font-size: 28px;
        color: var(--text);
      }
      h1 span {
        color: var(--gold);
      }
      header p {
        margin: 6px 0 0;
        color: var(--text-dim);
        font-size: 14px;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: 14px;
        background: var(--panel);
        padding: 46px 20px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .dropzone:hover,
      .dropzone.drag {
        border-color: var(--gold-dim);
        background: var(--panel-2);
      }
      .dropzone strong {
        font-family: "Anton", sans-serif;
        font-size: 18px;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 8px;
      }
      .dropzone p {
        color: var(--text-dim);
        font-size: 13px;
        margin: 4px 0 0;
      }
      input[type="file"] {
        display: none;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        margin-top: 20px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .controls label {
        font-size: 12px;
        color: var(--text-dim);
        display: flex;
        flex-direction: column;
        gap: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .controls select,
      .controls input[type="number"] {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 7px 10px;
        border-radius: 6px;
        font-size: 14px;
      }
      .spacer {
        flex: 1;
      }
      button {
        font-family: "Archivo", sans-serif;
        font-weight: 800;
        letter-spacing: 0.3px;
        border: none;
        border-radius: 7px;
        padding: 11px 18px;
        cursor: pointer;
        font-size: 13px;
        text-transform: uppercase;
        transition:
          transform 0.1s,
          opacity 0.15s;
      }
      button:active {
        transform: scale(0.97);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-gold {
        background: var(--gold);
        color: #17140a;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-outline:hover {
        border-color: var(--gold-dim);
      }

      #status {
        margin-top: 14px;
        font-size: 13px;
        color: var(--text-dim);
        min-height: 18px;
      }
      .progress-bar {
        height: 6px;
        border-radius: 4px;
        background: var(--panel-2);
        overflow: hidden;
        margin-top: 8px;
        display: none;
      }
      .progress-bar.show {
        display: block;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--gold-dim), var(--gold));
        transition: width 0.2s;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .page-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .page-card img {
        width: 100%;
        display: block;
        border-bottom: 1px solid var(--border);
        background: #fff;
      }
      .page-card .meta {
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .page-card .meta span {
        font-size: 12px;
        color: var(--text-dim);
        font-weight: 600;
      }
      .page-card .meta button {
        padding: 6px 10px;
        font-size: 11px;
      }
      footer {
        text-align: center;
        color: var(--text-dim);
        font-size: 12px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PDF <span>→</span> PNG</h1>
      <p>
        Convertis chaque page d'un PDF en image PNG, exportable une par une ou
        en ZIP.
      </p>
    </header>

    <main>
      <div class="dropzone" id="dropzone">
        <strong>📄 Dépose ton PDF ici ou clique pour choisir un fichier</strong>
        <p>Un seul fichier PDF à la fois</p>
        <input type="file" id="fileInput" accept="application/pdf" />
      </div>

      <div class="controls">
        <label
          >Qualité (zoom)
          <select id="scaleSelect">
            <option value="1">1x (rapide)</option>
            <option value="2" selected>2x (recommandé)</option>
            <option value="3">3x (haute qualité)</option>
            <option value="4">4x (impression)</option>
          </select>
        </label>
        <label
          >Format
          <select id="formatSelect">
            <option value="image/png">PNG</option>
            <option value="image/jpeg">JPEG</option>
          </select>
        </label>
        <div class="spacer"></div>
        <button class="btn-outline" id="downloadAllBtn" disabled>
          Tout télécharger (.zip)
        </button>
        <button class="btn-gold" id="convertBtn" disabled>Convertir</button>
      </div>

      <div id="status"></div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="grid" id="grid"></div>
    </main>

    <footer>
      Top Gbairai Tools — traitement 100% local, rien n'est envoyé sur un
      serveur.
    </footer>

    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("fileInput");
      const convertBtn = document.getElementById("convertBtn");
      const downloadAllBtn = document.getElementById("downloadAllBtn");
      const scaleSelect = document.getElementById("scaleSelect");
      const formatSelect = document.getElementById("formatSelect");
      const statusEl = document.getElementById("status");
      const progressBar = document.getElementById("progressBar");
      const progressFill = document.getElementById("progressFill");
      const grid = document.getElementById("grid");

      let currentFile = null;
      let currentPages = []; // {blob, url, index}

      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("drag");
      });
      dropzone.addEventListener("dragleave", () =>
        dropzone.classList.remove("drag"),
      );
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("drag");
        const file = e.dataTransfer.files[0];
        if (file && file.type === "application/pdf") handleFile(file);
      });
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
      });

      function handleFile(file) {
        currentFile = file;
        convertBtn.disabled = false;
        downloadAllBtn.disabled = true;
        grid.innerHTML = "";
        currentPages = [];
        statusEl.textContent = `Fichier prêt : ${file.name}`;
      }

      convertBtn.addEventListener("click", async () => {
        if (!currentFile) return;
        convertBtn.disabled = true;
        downloadAllBtn.disabled = true;
        grid.innerHTML = "";
        currentPages = [];
        progressBar.classList.add("show");
        progressFill.style.width = "0%";

        try {
          const scale = parseFloat(scaleSelect.value);
          const format = formatSelect.value;
          const ext = format === "image/png" ? "png" : "jpg";

          statusEl.textContent = "Lecture du PDF...";
          const arrayBuffer = await currentFile.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const total = pdf.numPages;

          for (let i = 1; i <= total; i++) {
            statusEl.textContent = `Conversion page ${i} / ${total}...`;
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale });
            const canvas = document.createElement("canvas");
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext("2d");

            if (format === "image/jpeg") {
              ctx.fillStyle = "#fff";
              ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            await page.render({ canvasContext: ctx, viewport }).promise;

            const blob = await new Promise((res) =>
              canvas.toBlob(res, format, 0.95),
            );
            const url = URL.createObjectURL(blob);
            const pageNum = i;
            currentPages.push({ blob, url, index: pageNum, ext });

            const card = document.createElement("div");
            card.className = "page-card";
            card.innerHTML = `
        <img src="${url}" alt="Page ${pageNum}">
        <div class="meta">
          <span>Page ${pageNum}</span>
          <button class="btn-outline" data-page="${pageNum}">Télécharger</button>
        </div>
      `;
            card.querySelector("button").addEventListener("click", () => {
              const a = document.createElement("a");
              a.href = url;
              a.download = `${baseName(currentFile.name)}-page-${String(pageNum).padStart(2, "0")}.${ext}`;
              a.click();
            });
            grid.appendChild(card);

            progressFill.style.width = `${Math.round((i / total) * 100)}%`;
          }

          statusEl.textContent = `Terminé — ${total} page(s) converties.`;
          downloadAllBtn.disabled = false;
        } catch (err) {
          console.error(err);
          statusEl.textContent = `Erreur : ${err.message}`;
        } finally {
          convertBtn.disabled = false;
          setTimeout(() => progressBar.classList.remove("show"), 800);
        }
      });

      downloadAllBtn.addEventListener("click", async () => {
        if (!currentPages.length) return;
        downloadAllBtn.disabled = true;
        statusEl.textContent = "Compression en cours...";
        const zip = new JSZip();
        for (const p of currentPages) {
          zip.file(
            `${baseName(currentFile.name)}-page-${String(p.index).padStart(2, "0")}.${p.ext}`,
            p.blob,
          );
        }
        const content = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(content);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${baseName(currentFile.name)}-pages.zip`;
        a.click();
        statusEl.textContent = "ZIP téléchargé.";
        downloadAllBtn.disabled = false;
      });

      function baseName(name) {
        return name.replace(/\.pdf$/i, "").replace(/[^a-z0-9_-]+/gi, "_");
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MVP Quote Pro</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  background:#111;
  font-family:'Barlow Condensed',sans-serif;
}

/* CANVAS */
#capture{
  width:100%;
  max-width:600px; /* taille visuelle sur mobile */
  aspect-ratio:4/5;
  position:relative;
  overflow:hidden;
  background:#000;
  margin:auto;
}

@media(min-width:768px){
  #capture{
    max-width:800px;
  }
}

@media(min-width:1200px){
  #capture{
    max-width:1080px;
  }
}

#bgImg{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  filter:brightness(0.55);
}

/* OVERLAY */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(
    to top,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,0.9) 35%,
    rgba(0,0,0,0.6) 60%,
    transparent 80%
  );
}

/* BRAND */
.brand{
  position:absolute;
  top:3%;
  left:3%;
  display:flex;
  gap:10px;
  align-items:center;
}

.brand-name{
  background:#F5A800;
  color:#000;
  font-weight:900;
  padding:5px 12px;
}

.brand-date{
  color:#aaa;
}

/* QUOTE */
.quote{
  position:absolute;
  bottom:15%;
  width:90%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;

  font-size:clamp(22px,5vw,70px);
  font-weight:700;
  color:#fff;
  line-height:1.05;
}

.quote span{
  font-weight:900;
}

/* SOURCE */
.source{
  position:absolute;
  bottom:8%;
  width:100%;
  text-align:center;
  color:#ccc;
  font-size:clamp(12px,2vw,20px);
}

/* INPUT STYLE */
.form-control{
  background:#1a1a1a;
  color:#fff;
  border:1px solid #333;
}
</style>
</head>

<body>

<div class="container py-4">

  <!-- CANVAS -->
  <div id="capture">

    <img id="bgImg">

    <div class="overlay"></div>

    <div class="brand">
      <div id="brandName" class="brand-name">MVP INFO</div>
      <div id="date"></div>
    </div>

    <div id="quote" class="quote"></div>

    <div class="source" id="sourceText">MVP INFO EXCLUSIVE</div>

  </div>

  <!-- CONTROLS -->
  <div class="row g-2 mt-3">

    <div class="col-12">
      <input id="brandInput" class="form-control" value="MVP INFO">
    </div>

    <div class="col-12">
      <input type="file" id="imgInput" class="form-control">
    </div>

    <div class="col-12">
      <textarea id="textInput" class="form-control">quand le pays t'appelle, tu réponds présent</textarea>
    </div>

    <div class="col-md-6">
      <input id="highlight" class="form-control" value="présent">
    </div>

    <div class="col-md-6">
      <input id="sourceInput" class="form-control" value="Nicolas Pepe en exclusivité">
    </div>

    <div class="col-md-6">
      <label class="text-secondary small">Taille texte</label>
      <input type="range" id="fontSize" class="form-range" min="30" max="140" value="70">
    </div>

    <div class="col-md-3">
      <label class="text-secondary small">Texte</label>
      <input type="color" id="textColor" class="form-control form-control-color" value="#ffffff">
    </div>

    <div class="col-md-3">
      <label class="text-secondary small">Highlight</label>
      <input type="color" id="highlightColor" class="form-control form-control-color" value="#ff2d55">
    </div>

    <div class="col-12">
      <button id="dlBtn" class="btn btn-warning w-100 fw-bold">Télécharger PNG</button>
    </div>

  </div>

</div>

<script>

const bgImg = document.getElementById('bgImg');
const quote = document.getElementById('quote');

const textInput = document.getElementById('textInput');
const highlight = document.getElementById('highlight');

const brandInput = document.getElementById('brandInput');
const brandName = document.getElementById('brandName');

const sourceInput = document.getElementById('sourceInput');
const sourceText = document.getElementById('sourceText');

const fontSize = document.getElementById('fontSize');

const textColor = document.getElementById('textColor');
const highlightColor = document.getElementById('highlightColor');

const dateEl = document.getElementById('date');

/* DATE */
dateEl.textContent = new Date().toLocaleDateString('fr-FR',{
  day:'2-digit',
  month:'short',
  year:'numeric'
});

/* IMAGE */
document.getElementById('imgInput').addEventListener('change',e=>{
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => bgImg.src = ev.target.result;
  reader.readAsDataURL(file);
});

/* RENDER */
function render(){

  let text = textInput.value;
  let h = highlight.value;

  if(h){
    let reg = new RegExp('('+h+')','gi');
    text = text.replace(reg, `<span>$1</span>`);
  }

  quote.innerHTML = text;

  quote.style.fontSize = fontSize.value + "px";
  quote.style.color = textColor.value;

  document.querySelectorAll('#quote span').forEach(el=>{
    el.style.color = highlightColor.value;
  });

  brandName.textContent = brandInput.value.toUpperCase();
  sourceText.textContent = sourceInput.value;
}

/* EVENTS */
[textInput, highlight, brandInput, sourceInput, fontSize, textColor, highlightColor]
.forEach(el => el.oninput = render);

/* DOWNLOAD */
document.getElementById('dlBtn').onclick = async ()=>{
  const canvas = await html2canvas(document.getElementById('capture'),{
    scale:2,
    backgroundColor:"#000"
  });

  const a = document.createElement('a');
  a.download="mvp_quote.png";
  a.href=canvas.toDataURL();
  a.click();
};

render();

</script>

</body>
</html>
